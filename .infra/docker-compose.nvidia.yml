# NVIDIA-accelerated Ollama. Alternative to running Ollama natively.
#   Windows: Docker Desktop + WSL2 + up-to-date NVIDIA Windows driver.
#   Linux:   nvidia-container-toolkit on the host
#            (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html)
# Verify GPU is visible to Docker before `up`:
#   docker run --rm --gpus all nvidia/cuda:12.3.0-base-ubuntu22.04 nvidia-smi
#
# Run: docker compose -f docker-compose.nvidia.yml up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: vane-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: vane-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: -c "ollama pull phi3.5"
    restart: "no"

volumes:
  ollama-models:
