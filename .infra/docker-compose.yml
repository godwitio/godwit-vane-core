# Default stack for this machine: Apprise notification gateway only.
# Ollama runs natively on Windows (https://ollama.com/download/windows) and
# the core app reaches it at http://localhost:11434 as usual.
#
# For GPU-accelerated dockerized Ollama (main PC), use instead:
#   docker compose -f docker-compose.nvidia.yml up -d
#   docker compose -f docker-compose.intel.yml  up -d
#
# Run: docker compose up -d

services:
  apprise:
    image: caronc/apprise:latest
    container_name: vane-apprise
    ports:
      # Bind to loopback only — apprise-api has no auth, so any reachable
      # client can send through the configured webhooks.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./apprise:/config
    environment:
      # Read /config/<key>.yml on demand so POST /notify/<key> works.
      # Without this, /notify is stateless and ignores config.yml.
      APPRISE_STATEFUL_MODE: simple
      APPRISE_CONFIG_DIR: /config
    restart: unless-stopped
